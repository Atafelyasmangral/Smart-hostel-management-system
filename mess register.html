<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration</title>
  <link rel="stylesheet" href="register.css" />
</head>
<body>
  <div class="form-container">
    <h2>If you're a Hostel employee, please register below</h2>
    <form>
      <label>Name<span>*</span></label>
      <input type="text" required>

      <label>Parentage<span>*</span></label>
      <input type="text" required>

      <label>Address<span>*</span></label>
      <input type="text" required>

      <label>Designation<span>*</span></label>
      <input type="text" required>

      <label>Occupation<span>*</span></label>
      <input type="text" required>

      <label>Gender<span>*</span></label>
      <select required>
        <option value="">Select</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <label>Aadhaar Number<span>*</span></label>
      <input type="text" required>

      <label>Mobile Number<span>*</span></label>
      <input type="tel" required>
      <button type="button">Send OTP</button>

      <label>Email<span>*</span></label>
      <input type="email" required>
      <button type="button">Send OTP</button>

      <label>hostel name <span>*</span></label>
      <input type="text" required>

      <label><span>*</span></label>
      <input type="text" required>

      <label>Create Password<span>*</span></label>
      <input type="password" required>

      <label>Confirm Password<span>*</span></label>
      <input type="password" required>

      <button type="submit">Register</button>
    </form>
  </div>
</body>
</html>
