<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Smart Hostel</title>
  <link rel="stylesheet" href="LOGIN.CSS">
</head>
<body>
  <div class="login-container">
    <h2>Login to Smart Hostel Management</h2>
    <form class="login-form">
      <input type="text" placeholder="Login ID" required>
      <input type="password" placeholder="Password" required>
      <div class="captcha-container">
        <input type="text" placeholder="Enter CAPTCHA" required>
        <span class="captcha">A9XK2</span>
      </div>
      <button type="submit">Login</button>
      <a href="#" class="forgot">Forgot Password?</a>
    </form>
    <footer>
    © 2025 Smart Hostel Management System | Designed by @atifelyas
  </footer>

  </div>
</body>


</html>
